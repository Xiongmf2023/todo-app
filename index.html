      if (!popup.contains(ev.target)) { popup.remove(); document.body.removeEventListener('click', closeFn); }
    };
    setTimeout(() => document.body.addEventListener('click', closeFn), 50);
    setTimeout(() => { if (popup.parentNode) popup.remove(); }, 5000);
  });

  // ── 2048 handlers ─────────────────────────
  function open2048() {
    init2048(); render2048();
    document.getElementById('game2048Overlay').classList.add('show');
    document.getElementById('game2048Dialog').style.display='block';
  }
  function close2048() {
    document.getElementById('game2048Overlay').classList.remove('show');
    document.getElementById('game2048Dialog').style.display='none';
  }
  document.getElementById('game2048Close').addEventListener('click',close2048);
  document.getElementById('game2048Overlay').addEventListener('click',close2048);
  document.getElementById('g2048New').addEventListener('click',()=>{init2048();render2048();});

  // Swipe for 2048 on the board
  let g2048TouchX=0,g2048TouchY=0;
  document.getElementById('g2048Board').addEventListener('touchstart',e=>{
    g2048TouchX=e.touches[0].clientX; g2048TouchY=e.touches[0].clientY;
  },{passive:true});
  document.getElementById('g2048Board').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-g2048TouchX;
    const dy=e.changedTouches[0].clientY-g2048TouchY;
    if (Math.abs(dx)<20&&Math.abs(dy)<20) return;
    if (Math.abs(dx)>Math.abs(dy)) move2048(dx>0?'right':'left');
    else move2048(dy>0?'down':'up');
  });
  // Keyboard for 2048
  document.addEventListener('keydown',e=>{
    if (!document.getElementById('game2048Dialog')||document.getElementById('game2048Dialog').style.display==='none') return;
    const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if (map[e.key]) { e.preventDefault(); move2048(map[e.key]); }
  });

  // ── Sokoban handlers ──────────────────────
  function openSokoban() {
    if (!sokoMap.length) { sokoLevel=0; loadSokoban(); }
    renderSokoban();
    document.getElementById('sokobanOverlay').classList.add('show');
    document.getElementById('sokobanDialog').style.display='block';
  }
  function closeSokoban() {
    document.getElementById('sokobanOverlay').classList.remove('show');
    document.getElementById('sokobanDialog').style.display='none';
  }
  document.getElementById('sokobanClose').addEventListener('click',closeSokoban);
  document.getElementById('sokobanOverlay').addEventListener('click',closeSokoban);
  document.getElementById('sokoUndo').addEventListener('click',sokoUndo);
  document.getElementById('sokoReset').addEventListener('click',()=>{loadSokoban();renderSokoban();});
  document.getElementById('sokoPrev').addEventListener('click',()=>{if(sokoLevel>0){sokoLevel--;loadSokoban();renderSokoban();}});
  document.getElementById('sokoNext').addEventListener('click',()=>{if(sokoLevel<SOKO_LEVELS.length-1){sokoLevel++;loadSokoban();renderSokoban();}});
  document.querySelector('.soko-controls').addEventListener('click',e=>{
    const btn=e.target.closest('.soko-btn');
    if (!btn) return;
    const map={up:[-1,0],down:[1,0],left:[0,-1],right:[0,1]};
    const [dr,dc]=map[btn.dataset.dir];
    moveSoko(dr,dc);
  });

  // ── Swipe gestures ────────────────────────
  let touchX0 = 0, touchY0 = 0, touchCard = null, swipeDx = 0;
  const SWIPE = 70;

  taskList.addEventListener('touchstart', e => {
    const card = e.target.closest('.task-card');
    if (!card) return;
    touchCard = card;
    touchX0 = e.touches[0].clientX;
    touchY0 = e.touches[0].clientY;
    swipeDx = 0;
    const bg = card.querySelector('.swipe-bg');
    if (bg) bg.style.transform = 'translateX(100%)';
  }, { passive: true });

  taskList.addEventListener('touchmove', e => {
    if (!touchCard) return;
    const dx = e.touches[0].clientX - touchX0;
    const dy = e.touches[0].clientY - touchY0;
    if (Math.abs(dy) > Math.abs(dx) * 1.2) return; // vertical scroll
    swipeDx = dx;
    const bg = touchCard.querySelector('.swipe-bg');
    if (!bg) return;
    if (dx < -10) {
      bg.style.left = 'auto'; bg.style.right = '0';
      bg.style.borderRadius = '0 var(--radius-sm) var(--radius-sm) 0';
      bg.style.backgroundColor = '#e05555';
      bg.textContent = '删除';
      bg.style.width = Math.min(Math.abs(dx), 100) + 'px';
      bg.style.transform = 'translateX(0)';
      bg.style.zIndex = '-1';
    } else if (dx > 10) {
      bg.style.left = '0'; bg.style.right = 'auto';
      bg.style.borderRadius = 'var(--radius-sm) 0 0 var(--radius-sm)';
      bg.style.backgroundColor = '#4aad5e';
      bg.textContent = '完成';
      bg.style.width = Math.min(dx, 100) + 'px';
      bg.style.transform = 'translateX(0)';
      bg.style.zIndex = '-1';
    }
  }, { passive: true });

  taskList.addEventListener('touchend', () => {
    if (!touchCard) return;
    const tid = parseInt(touchCard.dataset.tid);
    const bg = touchCard.querySelector('.swipe-bg');
    if (Math.abs(swipeDx) > SWIPE && tid) {
      if (swipeDx < -SWIPE) deleteTask(tid);
      else if (swipeDx > SWIPE) toggleTask(tid);
    }
    // Reset
    if (bg) { bg.style.transform = 'translateX(100%)'; bg.style.width = '0'; bg.style.zIndex = '-1'; }
    touchCard = null;
    swipeDx = 0;
  });

  // ── Calendar swipe (left/right = prev/next month) ──
  let calTouchX = 0, calSwiping = false;
  taskList.addEventListener('touchstart', e => {
    if (!e.target.closest('.calendar-wrap')) { calSwiping = false; return; }
    calTouchX = e.touches[0].clientX;
    calSwiping = true;
  }, { passive: true });

  taskList.addEventListener('touchmove', e => {
    if (!calSwiping) return;
  }, { passive: true });

  taskList.addEventListener('touchend', e => {
    if (!calSwiping) return;
    calSwiping = false;
    const dx = e.changedTouches[0].clientX - calTouchX;
    if (Math.abs(dx) < 50) return;
    const { year, month } = getCalMonth();
    if (dx < -50) setCalMonth(month === 11 ? year + 1 : year, month === 11 ? 0 : month + 1);
    else setCalMonth(month === 0 ? year - 1 : year, month === 0 ? 11 : month - 1);
    renderAll();
  });

  // ── Focus input ────────────────────────────
  // Don't auto-focus on mobile to prevent keyboard from popping up
  // addInput.focus();
});

})();
</script>
</body>
</html>
